server:
  host: 0.0.0.0
  port: 8080
  log_level: INFO

mqtt:
  host: localhost
  port: 1883
  username: null
  password: null

database:
  path: /data/obs.db

# History backend is configured through the Admin UI (Settings → History Backend).
# The active plugin and its credentials are stored in the database (app_settings table).
# Defaults to the built-in SQLite backend when no history settings exist.
#
# InfluxDB example (configure in UI or set app_settings keys manually):
#   history.plugin          = influxdb
#   history.influx_url      = http://influxdb:8086
#   history.influx_version  = 2            # 1 | 2 | 3
#   history.influx_token    = my-api-token
#   history.influx_org      = my-org
#   history.influx_bucket   = obs
#
# TimescaleDB example:
#   history.plugin          = timescaledb
#   history.timescale_dsn   = postgresql://user:pass@timescaledb:5432/obs
#   (requires: pip install asyncpg)

# RingBuffer settings (max_entries, max_file_size_bytes, max_age) are stored
# in the database (app_settings table) and configured at runtime via the
# Admin UI (Monitor → Konfiguration). Default when nothing is persisted yet:
# unbounded entries/age, 10 MiB file-size cap.

security:
  jwt_secret: changeme      # In Produktion: aus Env-Var OBS_SECURITY__JWT_SECRET
  jwt_expire_minutes: 1440
