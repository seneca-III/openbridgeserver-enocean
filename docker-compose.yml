# open bridge server — Docker Compose Stack
# Services: obs + mosquitto (MQTT broker)
#
# Quick start:
#   cp .env.example .env          # adjust secrets!
#   docker compose up -d
#
# Override any setting via environment variables (see .env.example).

services:

  # ── MQTT Broker ──────────────────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    # Run as root so the init script can set up directory/file permissions.
    # Mosquitto itself drops privileges to the 'mosquitto' user after startup.
    user: root
    # Init: fix directory permissions, (re)create passwd file, then run Mosquitto.
    # chmod 777 on the directory lets open bridge server (different UID) write the passwd file later.
    # chmod 644 on the file lets the mosquitto user (dropped from root) read it.
    # "exec" replaces the shell → Mosquitto becomes PID 1 (needed for SIGHUP reload).
    command: >
      sh -c "
      mkdir -p /mosquitto/passwd &&
      chmod 777 /mosquitto/passwd &&
      rm -f /mosquitto/passwd/passwd &&
      mosquitto_passwd -c -b /mosquitto/passwd/passwd $$MQTT_SVC_USER $$MQTT_SVC_PASS &&
      chmod 644 /mosquitto/passwd/passwd &&
      exec mosquitto -c /mosquitto/config/mosquitto.conf
      "
    environment:
      # Must match OBS_MQTT__USERNAME / PASSWORD below
      MQTT_SVC_USER: ${OBS_MQTT_USERNAME:-obs}
      MQTT_SVC_PASS: ${OBS_MQTT_PASSWORD:-changeme}
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_passwd:/mosquitto/passwd   # shared with obs for passwd file
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    ports:
      - "${OBS_MQTT_HOST_PORT:-1883}:1883"     # MQTT plain
      - "${OBS_MQTT_WS_HOST_PORT:-9001}:9001"  # MQTT over WebSocket
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-i", "healthcheck",
             "-u", "${OBS_MQTT_USERNAME:-obs}", "-P", "${OBS_MQTT_PASSWORD:-changeme}",
             "-W", "3"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── open bridge server ───────────────────────────────────────────────────
  obs:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_INSTANCE_NAME: ${OBS_INSTANCE_NAME:-}
        VITE_INSTANCE_COLOR: ${OBS_INSTANCE_COLOR:-amber}
    restart: unless-stopped
    # Share Mosquitto's PID namespace → open bridge server can send SIGHUP to PID 1 (Mosquitto).
    pid: "service:mosquitto"
    depends_on:
      mosquitto:
        condition: service_healthy
    volumes:
      - obs_data:/data
      - mosquitto_passwd:/mosquitto/passwd   # same shared volume → write passwd file
      # Optional: mount a host config.yaml (overrides the one inside /data)
      # - ./config.yaml:/data/config.yaml:ro
    ports:
      - "${OBS_HTTP_HOST_PORT:-8080}:8080"
    environment:
      # ── MQTT service account (must match MQTT_SVC_USER/PASS above) ──────
      OBS_MQTT__HOST: mosquitto
      OBS_MQTT__PORT: "1883"
      OBS_MQTT__USERNAME: ${OBS_MQTT_USERNAME:-obs}
      OBS_MQTT__PASSWORD: ${OBS_MQTT_PASSWORD:-changeme}

      # ── Mosquitto passwd management ─────────────────────────────────────
      OBS_MOSQUITTO__PASSWD_FILE: /mosquitto/passwd/passwd
      OBS_MOSQUITTO__SERVICE_USERNAME: ${OBS_MQTT_USERNAME:-obs}
      OBS_MOSQUITTO__SERVICE_PASSWORD: ${OBS_MQTT_PASSWORD:-changeme}
      # PID 1 = Mosquitto (shared PID namespace) → send SIGHUP to reload passwd
      OBS_MOSQUITTO__RELOAD_PID: "1"

      # ── Security ────────────────────────────────────────────────────────
      OBS_SECURITY__JWT_SECRET: ${OBS_JWT_SECRET:-changeme}

      # ── Logging ─────────────────────────────────────────────────────────
      OBS_SERVER__LOG_LEVEL: ${OBS_LOG_LEVEL:-INFO}

    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/v1/system/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s


volumes:
  obs_data:
  mosquitto_passwd:    # shared between mosquitto + obs for passwd file management
  mosquitto_data:      # Mosquitto persistence (retained messages, QoS queues)
  mosquitto_log:
