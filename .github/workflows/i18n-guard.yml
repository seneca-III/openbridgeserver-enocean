name: i18n Guard

on:
  push:
    branches:
      - main
      - '[0-9][0-9][0-9][0-9].*.x'  # release maintenance lines, e.g. 2026.6.x
      - bug/*
      - bugfix/*
      - feat/*
      - feature/*
  pull_request:
    branches:
      - main
      - '[0-9][0-9][0-9][0-9].*.x'  # release maintenance lines, e.g. 2026.6.x

permissions: {}

jobs:
  i18n-guard:
    name: i18n-guard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"

      - name: Run i18n hard gate (pull_request)
        if: github.event_name == 'pull_request'
        env:
          I18N_DIFF_BASE: ${{ github.event.pull_request.base.sha }}
          I18N_DIFF_HEAD: ${{ github.event.pull_request.head.sha }}
        run: ./tools/check-i18n-hardcoded-strings.sh

      - name: Run i18n soft gate (push)
        id: i18n_push
        if: github.event_name == 'push'
        continue-on-error: true
        env:
          I18N_DIFF_BASE: ${{ github.event.before }}
          I18N_DIFF_HEAD: ${{ github.sha }}
        run: ./tools/check-i18n-hardcoded-strings.sh

      - name: Report i18n soft-gate warning (push)
        if: github.event_name == 'push' && steps.i18n_push.outcome == 'failure'
        run: |
          echo "::warning title=i18n guard soft-fail::Hardcoded i18n strings found in push diff. This does not block push runs; PR runs remain hard-fail."
