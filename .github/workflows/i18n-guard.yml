name: i18n Guard

on:
  push:
    branches:
      - main
      - bugfix/*
      - feature/*
  pull_request:
    branches:
      - main

permissions: {}

jobs:
  i18n-guard:
    name: i18n-guard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Run i18n hard gate (pull_request)
        if: github.event_name == 'pull_request'
        env:
          I18N_DIFF_BASE: ${{ github.event.pull_request.base.sha }}
          I18N_DIFF_HEAD: ${{ github.event.pull_request.head.sha }}
        run: ./scripts/check-i18n-hardcoded-strings.sh

      - name: Run i18n soft gate (push)
        id: i18n_push
        if: github.event_name == 'push'
        continue-on-error: true
        env:
          I18N_DIFF_BASE: ${{ github.event.before }}
          I18N_DIFF_HEAD: ${{ github.sha }}
        run: ./scripts/check-i18n-hardcoded-strings.sh

      - name: Report i18n soft-gate warning (push)
        if: github.event_name == 'push' && steps.i18n_push.outcome == 'failure'
        run: |
          echo "::warning title=i18n guard soft-fail::Hardcoded i18n strings found in push diff. This does not block push runs; PR runs remain hard-fail."
