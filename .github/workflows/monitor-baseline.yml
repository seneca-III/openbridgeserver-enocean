name: Monitor Baseline

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - bugfix/*
      - feature/*
      - 36-monitor-ringbuffer-plan

jobs:
  monitor-baseline:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements_dev.txt

      - name: Run monitor baseline suite
        run: |
          pytest \
            tests/unit/test_ringbuffer_baseline.py \
            tests/unit/test_websocket_ringbuffer_contract.py \
            tests/integration/test_value_propagation.py \
            tests/integration/test_ringbuffer_filters.py \
            -v
