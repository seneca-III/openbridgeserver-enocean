[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session

# Output
addopts =
    -v
    --tb=short
    --strict-markers

markers =
    slow: marks tests as slow (deselect with -m "not slow")
    integration: marks integration tests (requires Docker)
    contracts: marks contract tests for external library API surfaces
